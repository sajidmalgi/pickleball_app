// ─── DISPATCH ─────────────────────────────────────────────────────────────────
function DispatchPage({ data, setData, currentUser, pushUpdate, onRefresh }) {
  const { players, banter } = data;
  const [text, setText]   = useState('');
  const [rxns, setRxns]   = useState(() => banter.reduce((a,b)=>({...a,[b.id]:b.reactions}),{}));
  const [showCompose, setShowCompose] = useState(false);
  const listRef = useRef(null);
  useEffect(() => { setRxns(banter.reduce((a,b)=>({...a,[b.id]:b.reactions}),{})); }, [banter]);

  // My reactions — stored locally so one reaction per emoji per post per user
  const myRxnKey = `rally_rxns_${currentUser}`;
  const [myRxns, setMyRxns] = useState(() => {
    try { return JSON.parse(localStorage.getItem(myRxnKey)) || {}; } catch { return {}; }
  });
  const hasReacted = (bid, emoji) => !!myRxns[`${bid}_${emoji}`];
  const saveMyRxns = (next) => {
    setMyRxns(next);
    try { localStorage.setItem(myRxnKey, JSON.stringify(next)); } catch {}
  };

  const ALL_REACTIONS = [['fire','🔥'],['skull','💀'],['trophy','🏆'],['laugh','😂'],['clap','👏'],['eyes','👀']];

  const post = () => {
    if (!text.trim()||!currentUser) return;
    const nb={id:Date.now(),playerId:currentUser,text:text.trim(),time:'just now',reactions:{fire:0,skull:0,trophy:0,laugh:0,clap:0,eyes:0}};
    const next={...data,banter:[nb,...banter]};
    setData(next);
    pushUpdate(next, {type:'banter',icon:'💬',title:'Posted!',msg:text.trim().slice(0,50)+(text.length>50?'…':'')});
    setText(''); setShowCompose(false);
  };

  const react = (bid, emoji) => {
    const key = `${bid}_${emoji}`;
    const alreadyReacted = hasReacted(bid, emoji);
    // Toggle: add if not reacted, remove if already reacted
    const cur = rxns[bid] || {};
    const newCount = alreadyReacted
      ? Math.max(0, (cur[emoji] || 0) - 1)
      : (cur[emoji] || 0) + 1;
    const nextRxns = {...rxns, [bid]: {...cur, [emoji]: newCount}};
    setRxns(nextRxns);
    // Update my reactions log
    const nextMyRxns = {...myRxns};
    if (alreadyReacted) { delete nextMyRxns[key]; } else { nextMyRxns[key] = true; }
    saveMyRxns(nextMyRxns);
    const nextBanter = banter.map(b => b.id===bid ? {...b, reactions:nextRxns[bid]} : b);
    const next = {...data, banter:nextBanter};
    setData(next); pushUpdate(next);
  };

  const me = players.find(p=>p.id===currentUser);

  return (
    <div className="page" style={{maxWidth:700, paddingBottom: 130}}>
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:16}}>
        <div><div className="kicker">Crew chat</div><div className="hed">THE <span className="a">DISPATCH</span></div></div>
        <button onClick={onRefresh} title="Refresh" style={{background:'none',border:'1px solid var(--border2)',borderRadius:4,color:'var(--text3)',cursor:'pointer',padding:'6px 9px',fontSize:14,lineHeight:1,transition:'all 0.15s'}}
          onMouseEnter={e=>e.currentTarget.style.color='var(--neon)'} onMouseLeave={e=>e.currentTarget.style.color='var(--text3)'}>↺</button>
      </div>

      {/* Posts feed */}
      <div ref={listRef} className="card" style={{padding:'2px 14px'}}>
        {banter.length===0 && <div className="empty">Nothing yet — be first to talk.</div>}
        {banter.map(b=>{
          const p=players.find(x=>x.id===b.playerId);
          if (!p) return null;
          const r={...{fire:0,skull:0,trophy:0,laugh:0,clap:0,eyes:0},...(rxns[b.id]||b.reactions)};
          return (
            <div key={b.id} className="bp">
              <div className="bp-meta">
                <Av player={p} size={26} />
                <span className="bp-author">{p.name}</span>
                <span className="bp-time">{b.time}</span>
              </div>
              <div className="bp-text">{b.text}</div>
              <div className="bp-rxns" style={{flexWrap:'wrap',gap:5}}>
                {ALL_REACTIONS.map(([k,e])=>{
                  const reacted = hasReacted(b.id,k);
                  return (
                    <button key={k} className="bp-btn" onClick={()=>react(b.id,k)} style={{
                      opacity: r[k] ? 1 : 0.4,
                      transition:'all 0.15s',
                      borderColor: reacted ? 'var(--neon)' : undefined,
                      color: reacted ? 'var(--neon)' : undefined,
                      background: reacted ? 'rgba(200,255,0,0.08)' : undefined,
                    }} title={reacted ? 'Tap to remove' : 'React'}>
                      {e} {r[k]||0}
                    </button>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>

      {/* Fixed compose bar at bottom — above bottom nav */}
      <div style={{
        position:'fixed',bottom:'calc(56px + env(safe-area-inset-bottom, 0px))',left:0,right:0,
        background:'var(--bg2)',borderTop:'1px solid var(--border2)',zIndex:90,
        padding:'10px 14px',boxShadow:'0 -4px 24px rgba(0,0,0,0.4)'
      }}>
        {showCompose ? (
          <div>
            {me && (
              <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:8}}>
                <Av player={me} size={24} />
                <span style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,fontSize:13,textTransform:'uppercase',color:'var(--text)'}}>{me.name}</span>
              </div>
            )}
            <textarea autoFocus value={text} onChange={e=>setText(e.target.value)}
              placeholder="Say something. Threaten someone. Celebrate yourself."
              rows={2} style={{resize:'none',marginBottom:8,fontSize:13}}
              onKeyDown={e=>{if(e.key==='Enter'&&(e.metaKey||e.ctrlKey))post();}} />
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button className="btn btn-ghost btn-sm" onClick={()=>{setShowCompose(false);setText('');}}>Cancel</button>
              <button className="btn btn-primary btn-sm" onClick={post} disabled={!text.trim()}>Post →</button>
            </div>
          </div>
        ) : (
          <button onClick={()=>setShowCompose(true)} style={{
            width:'100%',background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:6,
            padding:'11px 14px',cursor:'pointer',textAlign:'left',
            fontFamily:'Barlow,sans-serif',fontSize:13,color:'var(--text3)',
            display:'flex',alignItems:'center',gap:10,transition:'border-color 0.15s'
          }} onMouseEnter={e=>e.currentTarget.style.borderColor='var(--neon)'} onMouseLeave={e=>e.currentTarget.style.borderColor='rgba(255,255,255,0.13)'}>
            {me && <Av player={me} size={24} />}
            <span>Drop a take…</span>
            <span style={{marginLeft:'auto',fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,fontSize:11,letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--neon)'}}>Post →</span>
          </button>
        )}
      </div>
    </div>
  );
}



// ─── ADMIN PAGE ───────────────────────────────────────────────────────────────
function AdminPage({ data, setData, pushUpdate, currentUser, onBack }) {
  const { players, matches, banter } = data;
  const [tab, setTab] = useState('matches');
  const [editMatch, setEditMatch] = useState(null);
  const [editForm, setEditForm] = useState(null);
  const [confirm, setConfirm] = useState(null); // {type, id, label}
  const name = ids => ids.map(id=>{const p=players.find(x=>x.id===id);return p?p.name.split(' ')[0]:'?';}).join(' & ');

  // ── Recalculate all player W/L/streak from match history ──
  const recalcFromMatches = (allMatches, allPlayers) => {
    const stats = {};
    allPlayers.forEach(p => { stats[p.id] = {wins:0,losses:0,streak:0,lastResult:null}; });
    [...allMatches].sort((a,b)=>a.date.localeCompare(b.date)).forEach(m => {
      [...m.team1,...m.team2].forEach(pid => {
        if (!stats[pid]) return;
        const inT1 = m.team1.includes(pid);
        const won = (inT1 && m.score1>m.score2) || (!inT1 && m.score2>m.score1);
        if (won) { stats[pid].wins++; stats[pid].streak = stats[pid].streak>=0?stats[pid].streak+1:1; }
        else     { stats[pid].losses++; stats[pid].streak = stats[pid].streak<=0?stats[pid].streak-1:-1; }
      });
    });
    return allPlayers.map(p => ({...p, ...{wins:stats[p.id]?.wins??p.wins, losses:stats[p.id]?.losses??p.losses, streak:stats[p.id]?.streak??p.streak}}));
  };

  const deleteMatch = async (id) => {
    const nextMatches = matches.filter(m=>m.id!==id);
    const nextPlayers = recalcFromMatches(nextMatches, players);
    const next = {...data, matches:nextMatches, players:nextPlayers};
    setData(next); await pushUpdate(next);
    toast({type:'admin',icon:'🗑',title:'Match deleted',msg:'Records recalculated automatically'});
    setConfirm(null);
  };

  const deleteBanter = async (id) => {
    const next = {...data, banter: banter.filter(b=>b.id!==id)};
    setData(next); await pushUpdate(next);
    toast({type:'admin',icon:'🗑',title:'Post removed'});
    setConfirm(null);
  };

  const deletePlayer = async (id) => {
    const nextMatches = matches.filter(m=>!m.team1.includes(id)&&!m.team2.includes(id));
    const nextBanter  = banter.filter(b=>b.playerId!==id);
    const nextPlayers = players.filter(p=>p.id!==id);
    const next = {...data, players:nextPlayers, matches:nextMatches, banter:nextBanter};
    setData(next); await pushUpdate(next);
    toast({type:'admin',icon:'👤',title:'Player removed'});
    setConfirm(null);
  };

  const saveEditMatch = async () => {
    if (!editForm) return;
    const nextMatches = matches.map(m => m.id===editForm.id ? {...editForm, score1:parseInt(editForm.score1), score2:parseInt(editForm.score2)} : m);
    const nextPlayers = recalcFromMatches(nextMatches, players);
    const next = {...data, matches:nextMatches, players:nextPlayers};
    setData(next); await pushUpdate(next);
    toast({type:'admin',icon:'✏️',title:'Match updated',msg:'All records recalculated'});
    setEditMatch(null); setEditForm(null);
  };

  return (
    <div className="page" style={{maxWidth:800}}>
      <button className="back-btn" onClick={onBack}>← Back</button>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:18}}>
        <div>
          <div className="kicker">Admin Controls</div>
          <div className="hed" style={{fontSize:'clamp(22px,5vw,36px)'}}>ADMIN <span className="a">PANEL</span></div>
        </div>
        <span className="admin-badge" style={{marginLeft:'auto'}}>⚡ Admin</span>
      </div>

      {/* Tabs */}
      <div style={{display:'flex',borderBottom:'1px solid var(--border2)',marginBottom:16,gap:0}}>
        {[['matches','Matches'],['banter','Posts'],['players','Players']].map(([id,lbl])=>(
          <button key={id} onClick={()=>setTab(id)} style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:12,fontWeight:700,letterSpacing:'0.1em',textTransform:'uppercase',background:'none',border:'none',borderBottom:`2px solid ${tab===id?'#c8ff00':'transparent'}`,color:tab===id?'#c8ff00':'#5a5a6e',padding:'7px 16px',cursor:'pointer',marginBottom:'-1px'}}>{lbl}</button>
        ))}
      </div>

      {/* MATCHES TAB */}
      {tab==='matches' && (
        <div className="admin-section">
          <div className="admin-section-title">⚡ Match Results <span style={{fontFamily:'DM Mono,monospace',fontSize:9,color:'var(--text3)',fontWeight:400,textTransform:'none',letterSpacing:'0.06em'}}>Edit scores or delete entries. Records auto-recalculate.</span></div>
          {[...matches].sort((a,b)=>b.date.localeCompare(a.date)).map(m=>(
            <div key={m.id}>
              {editMatch===m.id && editForm ? (
                <div style={{background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:4,padding:12,marginBottom:8}}>
                  <div style={{display:'grid',gridTemplateColumns:'1fr auto 1fr',gap:8,alignItems:'end',marginBottom:10}}>
                    <div><label>T1 Score</label><input type="number" value={editForm.score1} onChange={e=>setEditForm({...editForm,score1:e.target.value})} style={{textAlign:'center',fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,fontSize:20}} /></div>
                    <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,fontSize:14,color:'#5a5a6e',paddingBottom:10,textAlign:'center'}}>VS</div>
                    <div><label>T2 Score</label><input type="number" value={editForm.score2} onChange={e=>setEditForm({...editForm,score2:e.target.value})} style={{textAlign:'center',fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,fontSize:20}} /></div>
                  </div>
                  <div className="ff" style={{marginBottom:10}}><label>Note</label><input type="text" value={editForm.note||''} onChange={e=>setEditForm({...editForm,note:e.target.value})} /></div>
                  <div style={{display:'flex',gap:6}}>
                    <button className="btn btn-primary btn-sm" onClick={saveEditMatch}>Save</button>
                    <button className="btn btn-ghost btn-sm" onClick={()=>{setEditMatch(null);setEditForm(null);}}>Cancel</button>
                  </div>
                </div>
              ) : (
                <div className="admin-row">
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,fontSize:13,textTransform:'uppercase',color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                      {name(m.team1)} <span style={{color:'var(--neon)'}}>{m.score1}</span><span style={{color:'var(--bg4)',margin:'0 4px'}}>–</span><span style={{color:'rgba(200,255,0,0.5)'}}>{m.score2}</span> {name(m.team2)}
                    </div>
                    <div style={{fontFamily:'DM Mono,monospace',fontSize:9,color:'var(--text3)',marginTop:2}}>{fmtDate(m.date)} · {m.sport}{m.note?` · "${m.note}"`:''}</div>
                  </div>
                  <button className="admin-edit" onClick={()=>{setEditMatch(m.id);setEditForm({...m});}}>Edit</button>
                  <button className="admin-del" onClick={()=>setConfirm({type:'match',id:m.id,label:`${name(m.team1)} vs ${name(m.team2)} on ${fmtDate(m.date)}`})}>Delete</button>
                </div>
              )}
            </div>
          ))}
          {matches.length===0 && <div className="empty">No matches yet</div>}
        </div>
      )}

      {/* BANTER TAB */}
      {tab==='banter' && (
        <div className="admin-section">
          <div className="admin-section-title">💬 Dispatch Posts <span style={{fontFamily:'DM Mono,monospace',fontSize:9,color:'var(--text3)',fontWeight:400,textTransform:'none',letterSpacing:'0.06em'}}>Remove disrespectful or unwanted posts.</span></div>
          {banter.map(b=>{
            const p=players.find(x=>x.id===b.playerId);
            return (
              <div key={b.id} className="admin-row">
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,fontSize:12,textTransform:'uppercase',color:'var(--text2)'}}>{p?.name||'Unknown'} <span style={{color:'var(--text3)',fontWeight:400,fontSize:10,textTransform:'none',fontFamily:'DM Mono,monospace'}}>· {b.time}</span></div>
                  <div style={{fontSize:12,color:'var(--text3)',fontStyle:'italic',marginTop:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>"{b.text}"</div>
                </div>
                <button className="admin-del" onClick={()=>setConfirm({type:'banter',id:b.id,label:`"${b.text.slice(0,40)}…"` })}>Remove</button>
              </div>
            );
          })}
          {banter.length===0 && <div className="empty">No posts yet</div>}
        </div>
      )}

      {/* PLAYERS TAB */}
      {tab==='players' && (
        <div className="admin-section">
          <div className="admin-section-title">👥 Roster Management <span style={{fontFamily:'DM Mono,monospace',fontSize:9,color:'var(--text3)',fontWeight:400,textTransform:'none',letterSpacing:'0.06em'}}>Removing a player also removes their matches and posts.</span></div>
          {players.map(p=>(
            <div key={p.id} className="admin-row">
              <Av player={p} size={28} />
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,fontSize:13,textTransform:'uppercase',color:'var(--text)'}}>{p.name} {ADMIN_NAMES.some(n=>p.name.toLowerCase().startsWith(n.toLowerCase())) && <span className="admin-badge" style={{fontSize:'8px',padding:'1px 4px'}}>Admin</span>}</div>
                <div style={{fontFamily:'DM Mono,monospace',fontSize:9,color:'var(--text3)'}}>{p.handle} · {p.wins}W {p.losses}L</div>
              </div>
              {p.id !== currentUser && (
                <button className="admin-del" onClick={()=>setConfirm({type:'player',id:p.id,label:p.name})}>Remove</button>
              )}
            </div>
          ))}
        </div>
      )}

      {/* CONFIRM DIALOG */}
      {confirm && (
        <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setConfirm(null)}>
          <div className="modal" style={{maxWidth:360}}>
            <div className="modal-title" style={{color:'var(--loss)'}}>Confirm Delete</div>
            <div style={{fontSize:13,color:'var(--text2)',marginBottom:16,lineHeight:1.6}}>
              Are you sure you want to {confirm.type==='banter'?'remove the post':'delete'} <b style={{color:'var(--text)'}}>{confirm.label}</b>? This cannot be undone.
            </div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button className="btn btn-ghost btn-sm" onClick={()=>setConfirm(null)}>Cancel</button>
              <button className="btn btn-sm" style={{background:'var(--loss)',color:'#fff',border:'none'}}
                onClick={()=>confirm.type==='match'?deleteMatch(confirm.id):confirm.type==='banter'?deleteBanter(confirm.id):deletePlayer(confirm.id)}>
                Yes, Delete
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

      <div className="modal coh-modal">
        <div className="modal-title" style={{fontSize:16}}>⚡ The Code of Honour</div>
        <div style={{fontFamily:'DM Mono,monospace',fontSize:10,color:'var(--text3)',letterSpacing:'0.08em',marginBottom:10}}>
          One time only, {player.name.split(' ')[0]}. Read it.
        </div>
        <div className="coh-article">
          <ol>
            {CODE_TEXT.map((t,i) => <li key={i}>{t}</li>)}
          </ol>
        </div>
        <label style={{display:'flex',alignItems:'flex-start',gap:10,cursor:'pointer',marginBottom:14,fontSize:13,color:'var(--text2)',lineHeight:1.5}}>
          <input type="checkbox" checked={checked} onChange={e=>setChecked(e.target.checked)}
            style={{marginTop:2,accentColor:'#c8ff00',width:16,height:16,flexShrink:0}} />
          I've read the Code and I'm in. Let's run it.
        </label>
        <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
          <button className="btn btn-ghost btn-sm" onClick={onSkip}>Skip for now</button>
          <button className="btn btn-primary btn-sm" disabled={!checked} onClick={onSign}
            style={{opacity:checked?1:0.4}}>Sign the Code ✓</button>
        </div>
      </div>
    </div>
  );
}


// ─── CHALLENGE SYSTEM ─────────────────────────────────────────────────────────
function ChallengeModal({ challenger, players, onSend, onClose }) {
  const others = players.filter(p=>p.id!==challenger.id);
  const [target, setTarget] = useState(others[0]?.id||null);
  const [sport,  setSport]  = useState(SPORTS[0]);
  const [msg,    setMsg]    = useState('');
  const send = () => {
    if (!target) return;
    const t = players.find(p=>p.id===target);
    onSend({ id:Date.now(), fromId:challenger.id, toId:target, sport, msg:msg.trim()||`${challenger.name.split(' ')[0]} challenges you to a ${sport} match. You in?`, status:'open', date:today() });
  };
  const btnStyle = (active) => ({fontFamily:'Barlow Condensed,sans-serif',fontSize:11,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',padding:'5px 10px',borderRadius:4,cursor:'pointer',border:'1px solid',transition:'all 0.15s',borderColor:active?'#c8ff00':'rgba(255,255,255,0.13)',background:active?'rgba(200,255,0,0.1)':'none',color:active?'#c8ff00':'#5a5a6e'});
  return (
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-title">⚡ Issue a Challenge</div>
        <div className="ff"><label>Challenge</label>
          <div style={{display:'flex',flexDirection:'column',gap:4,marginTop:4}}>
            {others.map(p=>(
              <button key={p.id} onClick={()=>setTarget(p.id)} style={{display:'flex',alignItems:'center',gap:8,padding:'7px 10px',border:'1px solid',borderColor:target===p.id?'#c8ff00':'rgba(255,255,255,0.1)',background:target===p.id?'rgba(200,255,0,0.06)':'none',borderRadius:5,cursor:'pointer',textAlign:'left',transition:'all 0.15s'}}>
                <Av player={p} size={26} />
                <span style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,fontSize:14,textTransform:'uppercase',color:target===p.id?'#c8ff00':'#9898a8'}}>{p.name}</span>
              </button>
            ))}
          </div>
        </div>
        <div className="ff"><label>Sport</label>
          <div style={{display:'flex',gap:5,flexWrap:'wrap',marginTop:4}}>
            {SPORTS.map(s=><button key={s} type="button" onClick={()=>setSport(s)} style={btnStyle(sport===s)}>{s}</button>)}
          </div>
        </div>
        <div className="ff"><label>Trash talk (optional)</label><input type="text" value={msg} onChange={e=>setMsg(e.target.value)} placeholder={`e.g. "You scared?"`} /></div>
        <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary btn-sm" disabled={!target} onClick={send}>Send Challenge ⚡</button>
        </div>
      </div>
    </div>
  );
}

function ChallengeCard({ challenge, players, currentUser, onAccept, onDecline }) {
  const from = players.find(p=>p.id===challenge.fromId);
  const to   = players.find(p=>p.id===challenge.toId);
  if (!from||!to) return null;
  const isTarget = challenge.toId===currentUser;
  return (
    <div style={{background:'rgba(200,255,0,0.04)',border:'1px solid rgba(200,255,0,0.18)',borderRadius:6,padding:'10px 12px',marginBottom:8}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6,flexWrap:'wrap'}}>
        <Av player={from} size={24} />
        <span style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,fontSize:13,textTransform:'uppercase',color:'#c8ff00'}}>{from.name.split(' ')[0]}</span>
        <span style={{fontFamily:'DM Mono,monospace',fontSize:9,color:'#5a5a6e'}}>vs</span>
        <Av player={to} size={24} />
        <span style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,fontSize:13,textTransform:'uppercase',color:'#f0f0f5'}}>{to.name.split(' ')[0]}</span>
        <span style={{marginLeft:'auto',fontFamily:'DM Mono,monospace',fontSize:9,fontWeight:700,letterSpacing:'0.1em',textTransform:'uppercase',background:'rgba(200,255,0,0.1)',color:'#c8ff00',border:'1px solid rgba(200,255,0,0.25)',padding:'2px 6px',borderRadius:2,flexShrink:0}}>{challenge.sport}</span>
      </div>
      {challenge.msg && <div style={{fontSize:12,color:'#9898a8',fontStyle:'italic',marginBottom:8}}>"{challenge.msg}"</div>}
      {challenge.status==='open' && isTarget && (
        <div style={{display:'flex',gap:6}}>
          <button className="btn btn-primary btn-sm" onClick={()=>onAccept(challenge.id)}>Accept ✓</button>
          <button className="btn btn-ghost btn-sm" onClick={()=>onDecline(challenge.id)}>Decline</button>
        </div>
      )}
      {challenge.status==='open' && !isTarget && <div style={{fontFamily:'DM Mono,monospace',fontSize:9,color:'#5a5a6e',marginTop:4}}>Awaiting response…</div>}
      {challenge.status==='accepted' && <div style={{fontFamily:'DM Mono,monospace',fontSize:9,color:'var(--neon)',marginTop:4}}>✓ Challenge accepted — match pending</div>}
      {challenge.status==='declined' && <div style={{fontFamily:'DM Mono,monospace',fontSize:9,color:'#ff4d6a',marginTop:4}}>Declined</div>}
    </div>
  );
}

// ─── SCHEDULING ───────────────────────────────────────────────────────────────
function SchedulingCard({ data, setData, pushUpdate, currentUser }) {
  const { players } = data;
  const allSessions = data.sessions||[];
  const upcoming = allSessions.filter(s=>s.date>=today()).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,3);
  const [showAdd, setShowAdd] = useState(false);
  const [form, setForm] = useState({date:'',sport:SPORTS[0],note:''});
  const btnStyle = (active) => ({fontFamily:'Barlow Condensed,sans-serif',fontSize:11,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',padding:'5px 10px',borderRadius:4,cursor:'pointer',border:'1px solid',transition:'all 0.15s',borderColor:active?'#c8ff00':'rgba(255,255,255,0.13)',background:active?'rgba(200,255,0,0.1)':'none',color:active?'#c8ff00':'#5a5a6e'});

  const addSession = () => {
    if (!form.date) return;
    const s = {...form, id:Date.now(), rsvps:{}, createdBy:currentUser};
    const next = {...data, sessions:[...allSessions, s]};
    setData(next); pushUpdate(next, {type:'match',icon:'📅',title:'Session posted!',msg:`${form.sport} · ${fmtDate(form.date)}`});
    setShowAdd(false); setForm({date:'',sport:SPORTS[0],note:''});
  };
  const rsvp = (sid, status) => {
    const next = {...data, sessions: allSessions.map(s=>s.id===sid?{...s,rsvps:{...(s.rsvps||{}),[currentUser]:status}}:s)};
    setData(next); pushUpdate(next);
  };

  return (
    <div style={{marginBottom:14}}>
      <div className="sh"><h2>Next Sessions</h2><div className="sh-line"></div>
        <button className="btn btn-primary btn-sm" onClick={()=>setShowAdd(true)}>+ Plan</button>
      </div>
      {upcoming.length===0 && <div className="empty" style={{padding:'10px 0',fontSize:12}}>Nothing planned yet — who's organising?</div>}
      {upcoming.map(s=>{
        const inCount = Object.values(s.rsvps||{}).filter(v=>v==='in').length;
        const myRsvp = (s.rsvps||{})[currentUser];
        return (
          <div key={s.id} style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:6,padding:'10px 12px',marginBottom:8}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
              <div>
                <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,fontSize:14,textTransform:'uppercase',color:'#f0f0f5'}}>{s.sport}</div>
                <div style={{fontFamily:'DM Mono,monospace',fontSize:10,color:'#5a5a6e',marginTop:2}}>{fmtDate(s.date)}{s.note?` · ${s.note}`:''}</div>
              </div>
              <div style={{textAlign:'right',flexShrink:0}}>
                <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,fontSize:18,color:'#c8ff00',lineHeight:1}}>{inCount}</div>
                <div style={{fontFamily:'DM Mono,monospace',fontSize:8,color:'#5a5a6e'}}>IN</div>
              </div>
            </div>
            <div style={{display:'flex',gap:6}}>
              <button onClick={()=>rsvp(s.id,'in')} style={{...btnStyle(myRsvp==='in'),color:myRsvp==='in'?'#c8ff00':'#5a5a6e'}}>✓ I'm in</button>
              <button onClick={()=>rsvp(s.id,'out')} style={{...btnStyle(false),borderColor:myRsvp==='out'?'#ff4d6a':'rgba(255,255,255,0.13)',background:myRsvp==='out'?'rgba(255,77,106,0.08)':'none',color:myRsvp==='out'?'#ff4d6a':'#5a5a6e'}}>✗ Can't</button>
            </div>
          </div>
        );
      })}
      {showAdd && (
        <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setShowAdd(false)}>
          <div className="modal">
            <div className="modal-title">Plan a Session</div>
            <div className="ff"><label>Date</label><input type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})} /></div>
            <div className="ff"><label>Sport</label>
              <div style={{display:'flex',gap:5,flexWrap:'wrap',marginTop:4}}>
                {SPORTS.map(s=><button key={s} type="button" onClick={()=>setForm(f=>({...f,sport:s}))} style={btnStyle(form.sport===s)}>{s}</button>)}
              </div>
            </div>
            <div className="ff"><label>Note (time, location)</label><input type="text" value={form.note} onChange={e=>setForm({...form,note:e.target.value})} placeholder="e.g. Battle Arena, 6pm" /></div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button className="btn btn-ghost btn-sm" onClick={()=>setShowAdd(false)}>Cancel</button>
              <button className="btn btn-primary btn-sm" onClick={addSession}>Post Session</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App() {
  const [data,        setData]        = useState(null);
  const [syncStatus,  setSyncStatus]  = useState('loading');
  const [lastSync,    setLastSync]    = useState('');
  const [page,        setPage]        = useState('scoreboard');
  const [sport,       setSport]       = useState('Badminton');
  const [viewPlayer,  setViewPlayer]  = useState(null);
  const [currentUser, setCurrentUser] = useState(() => getSession()?.id || null);
  const [prevData,    setPrevData]    = useState(null);
  const [showCoH,     setShowCoH]     = useState(false);
  const pollRef = useRef(null);

  // ── Initial load ──
  useEffect(() => {
    if (!isConfigured()) { setData({players:[],matches:[],banter:[],venues:[]}); setSyncStatus('demo'); return; }
    load();
    // Poll every 30s for updates from other devices
    pollRef.current = setInterval(load, 20000);
    return () => clearInterval(pollRef.current);
  }, []);

  const CACHE_KEY = 'rally_data_cache';
  const loadFromCache = () => { try { const s = localStorage.getItem(CACHE_KEY); return s ? JSON.parse(s) : null; } catch { return null; } };
  const saveToCache  = (d) => { try { localStorage.setItem(CACHE_KEY, JSON.stringify(d)); } catch {} };

  const load = async () => {
    try {
      setSyncStatus('syncing');
      // Show cached data immediately while fetching fresh data
      const cached = loadFromCache();
      if (cached && !data) { setData(cached); }
      const d = await fetchData();
      // Start fresh if bin is empty — no demo data seeding
      if (!d || !d.players) {
        const empty = {players:[],matches:[],banter:[],venues:[]};
        setData(empty);
        saveToCache(empty);
      } else {
        setData(d);
        saveToCache(d);
      }
      setSyncStatus('ok');
      setLastSync(new Date().toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'}));
      // Notify about new events from other players on poll
      setPrevData(prev => {
        if (prev && d) {
          const newMatches = d.matches.filter(m => !prev.matches.find(pm => pm.id===m.id));
          const newBanter  = d.banter.filter(b => !prev.banter.find(pb => pb.id===b.id));
          newMatches.forEach(m => {
            const n1 = m.team1.map(id=>d.players.find(p=>p.id===id)?.name.split(' ')[0]||'?').join(' & ');
            const n2 = m.team2.map(id=>d.players.find(p=>p.id===id)?.name.split(' ')[0]||'?').join(' & ');
            toast({type:'match',icon:'⚡',title:'Match logged',msg:`${n1} ${m.score1}–${m.score2} ${n2} · ${m.sport}`});
          });
          newBanter.forEach(b => {
            const poster = d.players.find(p=>p.id===b.playerId);
            if (poster && poster.id !== currentUser) toast({type:'banter',icon:'💬',title:poster.name,msg:b.text.slice(0,60)+(b.text.length>60?'…':'')});
          });
        }
        return d;
      });
    } catch(e) {
      setSyncStatus('err');
    }
  };

  const pushUpdate = (next, toastMsg) => {
    // Optimistic: UI already updated by caller via setData before calling here
    setPrevData(next);
    if (toastMsg) toast(toastMsg);
    if (!isConfigured()) return;
    // Push to JSONbin in the background — no await, no blocking
    setSyncStatus('syncing');
    pushData(next)
      .then(() => {
        setSyncStatus('ok');
        setLastSync(new Date().toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'}));
      })
      .catch(() => {
        setSyncStatus('err');
        toast({type:'admin',icon:'⚠️',title:'Sync failed',msg:'Tap any action to retry.'});
      });
  };

  const handleRegister = async (playerId, pinHash) => {
    const next = {...data, players: data.players.map(p=>p.id===playerId?{...p,pinHash}:p)};
    setData(next);
    await pushUpdate(next);
  };

  const handleLogout = () => { clearSession(); setCurrentUser(null); setPage('scoreboard'); setPrevData(null); };
  const signCoH = () => {
    const next = {...data, players: data.players.map(p=>p.id===currentUser?{...p,signed:true}:p)};
    setData(next); pushUpdate(next);
    setShowCoH(false);
    toast({type:'match',icon:'✅',title:"Code signed! You're official."});
  };

  if (!isConfigured()) return <SetupScreen />;
  if (!data) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16,background:'#0d0d0f'}}>
      <div style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:52,fontWeight:900,color:'#c8ff00',letterSpacing:'-0.02em'}}>RALLY<span style={{color:'#2a2a35',fontSize:20,fontWeight:400,letterSpacing:'0.14em'}}>.GG</span></div>
      <div style={{display:'flex',gap:6}}>
        {[0,1,2].map(i=>(
          <div key={i} style={{width:6,height:6,borderRadius:'50%',background:'#c8ff00',animation:`pulse 1.2s ease-in-out ${i*0.2}s infinite`,opacity:0.3}}></div>
        ))}
      </div>
      <style>{`@keyframes pulse{0%,100%{opacity:0.2;transform:scale(0.8)}50%{opacity:1;transform:scale(1.2)}}`}</style>
      <div style={{fontFamily:'DM Mono,monospace',fontSize:10,color:'#3a3a4e',letterSpacing:'0.14em',textTransform:'uppercase'}}>Connecting…</div>
    </div>
  );
  const handleAddAndLogin = async (newPlayer) => {
    const next = {...data, players: [...data.players, newPlayer]};
    setData(next);
    pushUpdate(next);
    setSession({ id: newPlayer.id, name: newPlayer.name });
    setCurrentUser(newPlayer.id);
    setShowCoH(true);
  };
  if (!currentUser) return <LoginScreen players={data.players} onLogin={setCurrentUser} onRegister={handleRegister} onAddAndLogin={handleAddAndLogin} />;

  const amAdmin = data && isAdmin(data.players, currentUser);

  return (
    <ToastProvider>
      <Header page={page} setPage={setPage} players={data.players} currentUser={currentUser} onLogout={handleLogout} syncStatus={syncStatus} lastSync={lastSync} isAdmin={amAdmin} />
      {page==='scoreboard' && <ScoreboardPage data={data} sport={sport} setSport={setSport} setPage={setPage} setViewPlayer={setViewPlayer} setData={setData} currentUser={currentUser} onRefresh={load} />}
      {page==='roster'     && <RosterPage data={data} setData={setData} setViewPlayer={setViewPlayer} setPage={setPage} currentUser={currentUser} pushUpdate={pushUpdate} onRefresh={load} />}
      {page==='results'    && <ResultsPage data={data} setData={setData} sport={sport} pushUpdate={pushUpdate} onRefresh={load} currentUser={currentUser} />}
      {page==='venues'     && <VenuesPage data={data} setData={setData} pushUpdate={pushUpdate} currentUser={currentUser} />}
      {page==='rations'    && <RationsPage data={data} setData={setData} pushUpdate={pushUpdate} currentUser={currentUser} />}
      {page==='dispatch'   && <DispatchPage data={data} setData={setData} currentUser={currentUser} pushUpdate={pushUpdate} onRefresh={load} />}
      {page==='profile' && viewPlayer && <ProfilePage playerId={viewPlayer} data={data} setData={setData} onBack={()=>setPage('roster')} currentUser={currentUser} pushUpdate={pushUpdate} />}
      {page==='admin'   && amAdmin    && <AdminPage data={data} setData={setData} pushUpdate={pushUpdate} currentUser={currentUser} onBack={()=>setPage('scoreboard')} />}
      <BottomNav page={page} setPage={setPage} isAdmin={amAdmin} />
      {showCoH && currentUser && (()=>{ const me=data.players.find(p=>p.id===currentUser); return me&&!me.signed?<CodeOfHonourModal player={me} onSign={signCoH} onSkip={()=>setShowCoH(false)} />:null; })()}
    </ToastProvider>
  );
}

function NavIcon({ id, active }) {
  const col = active ? '#c8ff00' : '#5a5a6e';
  const icons = {
    scoreboard: <svg viewBox="0 0 20 20" fill="none" stroke={col} strokeWidth="1.5" strokeLinecap="round"><rect x="2" y="10" width="3" height="8" rx="0.5"/><rect x="8.5" y="6" width="3" height="12" rx="0.5"/><rect x="15" y="2" width="3" height="16" rx="0.5"/></svg>,
    roster:     <svg viewBox="0 0 20 20" fill="none" stroke={col} strokeWidth="1.5" strokeLinecap="round"><circle cx="10" cy="7" r="3.5"/><path d="M3 17c0-3.3 3.1-6 7-6s7 2.7 7 6"/></svg>,
    results:    <svg viewBox="0 0 20 20" fill="none" stroke={col} strokeWidth="1.5" strokeLinecap="round"><rect x="4" y="3" width="12" height="14" rx="1.5"/><line x1="7" y1="8" x2="13" y2="8"/><line x1="7" y1="11" x2="13" y2="11"/><line x1="7" y1="14" x2="10" y2="14"/></svg>,
    venues:     <svg viewBox="0 0 20 20" fill="none" stroke={col} strokeWidth="1.5" strokeLinecap="round"><path d="M10 2C7.2 2 5 4.2 5 7c0 4 5 11 5 11s5-7 5-11c0-2.8-2.2-5-5-5z"/><circle cx="10" cy="7" r="1.5" fill={col} stroke="none"/></svg>,
    rations:    <svg viewBox="0 0 20 20" fill="none" stroke={col} strokeWidth="1.5" strokeLinecap="round"><path d="M6 2v5a4 4 0 0 0 4 4 4 4 0 0 0 4-4V2"/><line x1="10" y1="11" x2="10" y2="18"/><line x1="7" y1="18" x2="13" y2="18"/></svg>,
    dispatch:   <svg viewBox="0 0 20 20" fill="none" stroke={col} strokeWidth="1.5" strokeLinecap="round"><path d="M3 4h14a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H6l-4 3V5a1 1 0 0 1 1-1z"/></svg>,
    admin:      <svg viewBox="0 0 20 20" fill="none" stroke={col} strokeWidth="1.5" strokeLinecap="round"><path d="M10 2L4 5v5c0 3.9 2.6 7.4 6 8.5 3.4-1.1 6-4.6 6-8.5V5l-6-3z"/></svg>,
  };
  return <span className="bnav-icon">{icons[id]}</span>;
}

function BottomNav({ page, setPage, isAdmin }) {
  const base = [
    { id:'scoreboard', label:'Scores'  },
    { id:'roster',     label:'Roster'  },
    { id:'results',    label:'Results' },
    { id:'venues',     label:'Spots'   },
    { id:'rations',    label:'Fuel'    },
    { id:'dispatch',   label:'Chat'    },
  ];
  const items = isAdmin ? [...base, { id:'admin', label:'Admin' }] : base;
  return (
    <div className="bottom-nav">
      <div className="bottom-nav-inner">
        {items.map(it => (
          <button key={it.id} className={`bnav-btn${page===it.id||(page==='profile'&&it.id==='roster')?' active':''}`} onClick={()=>setPage(it.id)}>
            <NavIcon id={it.id} active={page===it.id||(page==='profile'&&it.id==='roster')} />
            <span className="bnav-lbl">{it.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
